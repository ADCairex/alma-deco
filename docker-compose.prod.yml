services:
  alma-deco-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: almadeco
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/adcairex/alma-deco-backend:latest
    env_file: ./backend/.env.prod
    volumes:
      - uploads:/app/uploads
    depends_on:
      alma-deco-db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/adcairex/alma-deco-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
