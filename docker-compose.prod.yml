services:
  alma-deco:
    image: ghcr.io/adcairex/alma-deco:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
    env_file:
      - .env.production
    volumes:
      - alma-data:/app/data
      - alma-uploads:/app/public/uploads
    networks:
      - brain-app_internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.almadeco.rule=Host(`almadeco.cairex-brain.com`)"
      - "traefik.http.routers.almadeco.entrypoints=websecure"
      - "traefik.http.routers.almadeco.tls.certresolver=letsencrypt"
      - "traefik.http.services.almadeco.loadbalancer.server.port=3000"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  alma-data:
  alma-uploads:

networks:
  brain-app_internal:
    external: true
